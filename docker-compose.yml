version: "3.9"

services:
  proxy:
    build: .
    container_name: gemini-proxy-server
    ports:
      - "8080:8080"
    environment:
      # Path to the service account key inside the container
      - GOOGLE_APPLICATION_CREDENTIALS=/var/secrets/google/service-account.json
      # Project ID used for quota/billing (optional but recommended)
      - GOOGLE_CLOUD_PROJECT=gemini-rag-demo-486916
      # Region for the Gemini Live API (default is us-central1)
      - GOOGLE_CLOUD_REGION=europe-west4
    volumes:
      # Mount your local service account key into the container (read-only)
      - ./service-account.json:/var/secrets/google/service-account.json:ro
    restart: unless-stopped

  nginx:
      image: nginx:alpine
      container_name: nginx-proxy
      ports:
          - "80:80"
      volumes:
          - ./nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:
          - proxy
